name: lighthouse

# Lighthouse on the deployed Vercel preview URL. Runs on every PR after
# build completes; surfaces regressions in performance, a11y, SEO, and
# best practices. Budgets are advisory at first (warn, not fail) — once
# the team gets a feel for noise levels we tighten.

on:
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same branch to save CI minutes.
concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

      - name: Start production server
        run: pnpm start &
        env:
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:3000 > /dev/null; then
              echo "ready"
              exit 0
            fi
            sleep 1
          done
          echo "server never came up"
          exit 1

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        # Advisory for now (per this workflow's intent): report scores but don't
        # hard-block PRs while budgets are still being calibrated.
        continue-on-error: true
        with:
          urls: |
            http://127.0.0.1:3000/
            http://127.0.0.1:3000/donate
            http://127.0.0.1:3000/apply
            http://127.0.0.1:3000/programs/discounted-space
          uploadArtifacts: true
          # Budgets file lets us require performance/a11y/seo scores.
          # Configured advisory (warnings) until we see a few runs of
          # real numbers. Tighten by switching `assert` thresholds in
          # `.lighthouserc.json` from warn to error.
          configPath: ./.lighthouserc.json
