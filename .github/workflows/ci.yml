name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs when a new commit lands on the same ref; saves CI
# minutes during rapid PR iteration. Deploy workflows (when they land in
# Tier 2) should set cancel-in-progress: false instead so a deploy is never
# half-aborted.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # These steps mirror `pnpm qa` (lint && typecheck && knip && test &&
      # build) one-to-one, kept granular so a failure names the exact stage.
      # If you add a stage to `qa`, add it here too — the pre-push hook runs
      # `pnpm qa`, and CI must not be weaker than the local gate.
      - name: Biome lint + format check
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Knip (unused files / exports / dependencies)
        run: pnpm knip

      - name: Unit tests
        run: pnpm test

      - name: Next.js build
        run: pnpm build
        env:
          # Build must succeed without secrets; runtime keys are validated at
          # request time, so a clean Vercel preview build doesn't require any
          # third-party provisioning.
          NEXT_PUBLIC_SITE_URL: https://motive4artists.org

  # Deliberately not `needs: verify` — running in parallel makes the required
  # merge gate as slow as the longer job, not the sum of both. Trade-off: a
  # lint/type failure in `verify` no longer short-circuits e2e, so e2e can burn
  # minutes on an already-red PR. Worth it on a solo repo that optimizes for
  # fast green feedback over saved minutes.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # No standalone build step: playwright.config.ts's webServer already runs
      # `pnpm build && pnpm start`, so a separate `pnpm build` here compiled the
      # app twice.
      - name: Playwright (a11y + compliance smoke)
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
