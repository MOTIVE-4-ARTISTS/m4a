name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs when a new commit lands on the same ref;
# saves CI minutes during rapid PR iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome lint + format check
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test --reporter=verbose
        continue-on-error: true # remove once we have tests

      - name: Next.js build
        run: pnpm build
        env:
          # Build must succeed without secrets; runtime keys are validated at request time.
          NEXT_PUBLIC_SITE_URL: https://motive4artists.org
