name: codeql

# Free, autonomous, and the cheapest defense against XSS, SSRF, and
# prototype-pollution patterns on a site that will process donations and
# application data. Scheduled run catches advisories landed against our deps
# since the last push; PR run catches issues introduced in the diff.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1" # Mondays 05:23 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-and-quality includes the security-extended pack plus
          # maintainability queries; the extra noise is worth it for a
          # one-developer project where there is no second pair of eyes.
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
