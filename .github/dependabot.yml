version: 2

# Goals:
#   - Keep the boring 90 % of updates flowing automatically (grouped, weekly).
#   - Never auto-bump frameworks that historically need a deliberate migration
#     (Next.js, React, TypeScript, Tailwind majors).
#   - Stay quiet — open-pull-requests-limit caps noise during a fundraising
#     week or a tight feature push. Solo dev; one PR queue we can actually
#     review on a Sunday afternoon is the goal.

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/postcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      # AI SDK majors ride with the deferred /opportunities feature, not on their own.
      - dependency-name: "ai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@ai-sdk/google"
        update-types: ["version-update:semver-major"]
      # Keep @types/node aligned to the runtime (Node 22), not ahead of it.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]
